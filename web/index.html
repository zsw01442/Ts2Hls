<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TsToHls - 视频流转换工具</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/732/732232.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer@latest/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Lexend:wght@400;600;800&display=swap');
        
        body { font-family: 'Lexend', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .font-mono-jb { font-family: 'JetBrains Mono', monospace !important; }
        
        .main-card {
            background-color: #ffffff !important;
            border: 1px solid #f1f5f9;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            height: 520px; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .split-box { height: 50%; padding: 2.5rem 2rem; background-color: #ffffff; }
        .border-divider { border-top: 1px solid #f1f5f9; }

        .brand-text { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .unified-title {
            font-size: 1.125rem !important;
            font-weight: 700 !important;
            color: #1e293b !important;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-family: 'JetBrains Mono', monospace !important;
        }

        /* 优化：圆角减小，彻底去除边框 */
        .player-wrapper {
            background-color: #000;
            border-radius: 0.4rem; /* 圆角变小 */
            overflow: hidden;
            aspect-ratio: 16 / 9;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border: none; /* 去除外边框消除黑边感 */
        }

        #playerContainer { width: 100%; height: 100%; }

        .channel-btn { 
            transition: all 0.2s ease; 
            border: 1px solid #f1f5f9; 
            border-radius: 0.5rem; 
            background: white; 
            padding: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-align: left;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .channel-btn:hover { border-color: #4f46e5; transform: translateY(-1px); }
        
        .group-tag { transition: all 0.2s; border: 1px solid #e2e8f0; border-radius: 0.75rem; }
        .group-tag.active { background-color: #4f46e5; color: white; border-color: #4f46e5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-white border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i data-lucide="play" class="w-8 h-8 text-indigo-600"></i>
                <h1 class="text-3xl font-extrabold brand-text">TsToHls <span class="text-slate-300 font-mono-jb text-sm ml-2">v1.0.1</span></h1>
            </div>
            <nav class="flex gap-8">
                <button id="tabConsole" class="font-bold pb-2 border-b-4 border-indigo-600 text-indigo-600">系统控制</button>
                <button id="tabPreview" class="font-bold pb-2 border-b-4 border-transparent text-slate-400">直播预览</button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div id="consolePage">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
                <div class="main-card p-8">
                    <h2 class="unified-title"><i data-lucide="upload-cloud" class="w-5 h-5 text-indigo-500"></i>上传 M3U 文件</h2>
                    <div id="dropZone" class="flex-grow flex flex-col justify-center items-center bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer">
                        <div id="dropZoneContent" class="text-center">
                            <i data-lucide="file-plus" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
                            <p class="text-slate-500 font-semibold">拖拽或点击选择 M3U 文件</p>
                        </div>
                    </div>
                    <input type="file" id="fileInput" class="hidden" accept=".m3u,.m3u8">
                    <button id="uploadBtn" class="w-full mt-6 bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-lg shadow-indigo-100">开始转换</button>
                </div>

                <div class="main-card">
                    <div class="split-box">
                        <h2 class="unified-title"><i data-lucide="activity" class="w-5 h-5 text-indigo-500"></i>系统状态</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-emerald-50 rounded-2xl py-8 px-5 border border-emerald-100 text-center">
                                <div id="processCount" class="text-4xl font-bold text-emerald-600 font-mono-jb mb-2">0</div>
                                <p class="text-xs font-bold text-emerald-400 uppercase tracking-widest">活跃进程</p>
                            </div>
                            <div class="bg-indigo-50 rounded-2xl py-8 px-5 border border-indigo-100 text-center">
                                <div id="channelCount" class="text-4xl font-bold text-indigo-600 font-mono-jb mb-2">0</div>
                                <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest">已加载频道</p>
                            </div>
                        </div>
                    </div>
                    <div class="split-box border-divider flex flex-col justify-center">
                        <h2 class="unified-title"><i data-lucide="link-2" class="w-5 h-5 text-indigo-500"></i>转换结果</h2>
                        <div class="flex gap-2">
                            <input type="text" id="m3uUrl" readonly placeholder="等待转换..." class="flex-1 px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-400 font-mono-jb outline-none">
                            <button id="copyBtn" class="px-8 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-md">复制</button>
                        </div>
                    </div>
                </div>
            </div>
            <footer class="footer-target"></footer>
        </div>

        <div id="previewPage" class="hidden">
            <div class="max-w-6xl mx-auto">
                <div class="player-wrapper mb-8">
                    <div id="playerContainer" class="w-full h-full flex items-center justify-center text-slate-400 font-bold">
                        <p id="previewStatusText">请在系统控制页面上传文件并转换</p>
                    </div>
                </div>
                <div id="groupContainer" class="mb-6 flex gap-2 overflow-x-auto no-scrollbar pb-2"></div>
                <div id="channelGrid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-3 mb-12"></div>
            </div>
            <footer class="footer-target"></footer>
        </div>
    </main>

    <template id="footerTemplate">
        <div class="flex justify-center items-center gap-6 text-xs font-medium border-t border-slate-100 pt-10 pb-10">
            <span class="text-slate-400">Developed by <span class="text-slate-600">kronus09</span></span>
            <span class="text-slate-200">|</span>
            <a href="https://github.com/kronus09/TsToHls" target="_blank" class="flex items-center gap-1.5 text-slate-500 hover:text-indigo-600 transition-colors">
                <i data-lucide="github" class="w-4 h-4"></i> GitHub Repo
            </a>
            <span class="text-slate-200">|</span>
            <span class="text-slate-400 font-mono-jb">v1.0.1</span>
        </div>
    </template>

    <script>
        let channels = [];
        let currentGroup = '';
        let artPlayer = null;

        function init() {
            const ft = document.getElementById('footerTemplate').innerHTML;
            document.querySelectorAll('.footer-target').forEach(el => el.innerHTML = ft);
            lucide.createIcons();
        }

        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const dropZone = document.getElementById('dropZone');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
            dropZone.addEventListener(n, e => { e.preventDefault(); e.stopPropagation(); });
        });
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = () => {
            if(fileInput.files[0]) {
                document.getElementById('dropZoneContent').innerHTML = `<i data-lucide="check-circle" class="w-12 h-12 text-emerald-500 mx-auto mb-4"></i><p class="text-indigo-600 font-bold">${fileInput.files[0].name}</p>`;
                lucide.createIcons();
            }
        };

        function switchTab(t) {
            const isC = t === 'console';
            document.getElementById('consolePage').classList.toggle('hidden', !isC);
            document.getElementById('previewPage').classList.toggle('hidden', isC);
            document.getElementById('tabConsole').className = isC ? 'font-bold pb-2 border-b-4 border-indigo-600 text-indigo-600' : 'font-bold pb-2 border-b-4 border-transparent text-slate-400';
            document.getElementById('tabPreview').className = !isC ? 'font-bold pb-2 border-b-4 border-indigo-600 text-indigo-600' : 'font-bold pb-2 border-b-4 border-transparent text-slate-400';
        }
        document.getElementById('tabConsole').onclick = () => switchTab('console');
        document.getElementById('tabPreview').onclick = () => switchTab('preview');

        uploadBtn.onclick = async () => {
            if(!fileInput.files[0]) return fileInput.click();
            const fd = new FormData();
            fd.append('m3uFile', fileInput.files[0]);
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: fd });
                const data = await res.json();
                channels = data.channels || [];
                updateUI(fileInput.files[0].name, channels.length);
            } catch (e) { console.error(e); }
        };

        function updateUI(name, count) {
            const urlInput = document.getElementById('m3uUrl');
            urlInput.value = `${window.location.origin}/api/download/converted_${name}`;
            urlInput.classList.remove('text-slate-400');
            urlInput.classList.add('text-indigo-600', 'font-bold');
            document.getElementById('channelCount').textContent = count;
            document.getElementById('dropZoneContent').innerHTML = `<i data-lucide="check-circle" class="w-12 h-12 text-emerald-500 mx-auto mb-4"></i><p class="text-indigo-900 font-bold">已加载: ${name}</p>`;
            const statusText = document.getElementById('previewStatusText');
            if (statusText) statusText.textContent = "就绪，请选择频道播放";
            lucide.createIcons();
            renderPreview();
        }

        function renderPreview() {
            if (!channels || channels.length === 0) return;
            const groups = {};
            channels.forEach(ch => { const g = ch.Group || '其他'; if(!groups[g]) groups[g] = []; groups[g].push(ch); });
            const keys = Object.keys(groups).sort();
            if(!currentGroup && keys.length) currentGroup = keys[0];

            const gc = document.getElementById('groupContainer');
            gc.innerHTML = '';
            [...keys, '全部'].forEach(g => {
                const btn = document.createElement('button');
                btn.className = `group-tag px-4 py-2 text-xs font-bold whitespace-nowrap ${currentGroup === g ? 'active' : 'bg-white text-slate-400'}`;
                btn.textContent = g;
                btn.onclick = () => { currentGroup = g; renderPreview(); };
                gc.appendChild(btn);
            });

            const grid = document.getElementById('channelGrid');
            grid.innerHTML = '';
            (currentGroup === '全部' ? channels : groups[currentGroup])?.forEach(ch => {
                const b = document.createElement('button');
                b.className = 'channel-btn';
                // 修改：仅保留 Logo 和名称
                b.innerHTML = `
                    <img src="${ch.Logo}" class="w-6 h-6 object-contain shrink-0" onerror="this.src='https://cdn-icons-png.flaticon.com/512/732/732232.png'">
                    <span class="text-[11px] font-bold text-slate-700 truncate leading-tight">${ch.Name}</span>`;
                b.onclick = () => play(ch);
                grid.appendChild(b);
            });
        }

        function play(ch) {
            const url = `/stream/${ch.ID}/index.m3u8`;
            if(artPlayer) artPlayer.destroy();
            document.getElementById('playerContainer').innerHTML = '';
            artPlayer = new Artplayer({
                container: '#playerContainer', 
                url: url, 
                isLive: true, 
                autoplay: true, 
                theme: '#4f46e5',
                fullscreen: true,
                fullscreenWeb: true,
                autoSize: true, // 确保播放器尺寸自动贴合容器
                customType: {
                    m3u8: function(video, url) {
                        if (Hls.isSupported()) {
                            const hls = new Hls();
                            hls.loadSource(url);
                            hls.attachMedia(video);
                        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                            video.src = url;
                        }
                    }
                }
            });
        }

        document.getElementById('copyBtn').onclick = () => {
            const val = document.getElementById('m3uUrl').value;
            if (!val || val === "等待转换...") return;
            navigator.clipboard.writeText(val);
            const b = document.getElementById('copyBtn');
            b.textContent = '成功';
            setTimeout(() => b.textContent = '复制', 2000);
        };

        async function checkStatus() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                document.getElementById('processCount').textContent = d.active_processes || 0;
                if(d.filename && (!channels || channels.length === 0)) {
                    channels = d.channels || [];
                    updateUI(d.filename, d.channel_count);
                }
            } catch(e){}
        }

        window.onload = () => {
            init();
            checkStatus();
            setInterval(checkStatus, 3000);
        };
    </script>
</body>
</html>
